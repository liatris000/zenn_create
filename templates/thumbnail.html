<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>{{ARTICLE_TITLE}}</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  }
  .card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 80px;
    box-sizing: border-box;
    position: relative;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(235, 89, 39, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(88, 109, 204, 0.12) 0%, transparent 40%);
    pointer-events: none;
  }
  .tag {
    background: #eb5927;
    color: white;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 32px;
    z-index: 1;
  }
  .title {
    color: white;
    font-size: 64px;
    font-weight: bold;
    line-height: 1.3;
    margin-bottom: 40px;
    max-width: 1040px;
    z-index: 1;
    word-break: break-word;
  }
  .meta {
    color: #aaaaaa;
    font-size: 24px;
    z-index: 1;
  }
  /* タイトルが長いとき用 (40文字超で発火) */
  .title.long {
    font-size: 52px;
  }
  .title.very-long {
    font-size: 44px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="tag">{{TAG_TEXT}}</div>
  <div class="title" id="title">{{ARTICLE_TITLE}}</div>
  <div class="meta">zenn.dev/liatris</div>
</div>
<script>
  // タイトルの長さに応じてフォントサイズを自動調整
  const t = document.getElementById('title');
  const len = t.textContent.length;
  if (len > 50) t.classList.add('very-long');
  else if (len > 35) t.classList.add('long');
</script>
</body>
</html>
